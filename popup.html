<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>YouTuned</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7fb;
        --surface: #ffffff;
        --border: #e2e7f0;
        --text: #1f2937;
        --muted: #6b7280;
        --accent: #2563eb;
      }

      * { box-sizing: border-box; }

      body {
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        margin: 0;
        padding: 12px;
        width: 300px;
        background: var(--bg);
        color: var(--text);
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 12px;
        margin-bottom: 10px;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
      }

      .panel:last-child { margin-bottom: 0; }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .row.column {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      label {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }

      input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--accent);
        cursor: pointer;
      }

      .hint {
        margin-top: 7px;
        font-size: 11.5px;
        line-height: 1.4;
        color: var(--muted);
      }

      textarea {
        width: 100%;
        resize: vertical;
        min-height: 78px;
        box-sizing: border-box;
        padding: 8px 10px;
        font-size: 12.5px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fcfdff;
        color: var(--text);
      }

      textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
      }
    </style>
  </head>
  <body>

    <section class="panel">
      <div class="row">
        <label for="toggleShorts">Remover Youtube Shorts</label>
        <input id="toggleShorts" type="checkbox" />
      </div>
      <div class="hint">Bloqueia a seção de Shorts na interface</div>
    </section>

    <section class="panel">
      <div class="row">
        <label for="toggleDislikes">Mostrar Total de Dislikes</label>
        <input id="toggleDislikes" type="checkbox" />
      </div>
      <div class="hint">Mostra o contador de dislikes</div>
    </section>

    <section class="panel">
      <div class="row column">
        <label for="blockedWords">Remoção de Conteúdo</label>
        <div class="hint">Digite palavras separadas por vírgula. Vídeos e comentários com essas palavras serão ocultados.</div>
        <textarea id="blockedWords" rows="4" placeholder="ex.: filme, música, jogo"></textarea>
      </div>      
    </section>

    <section class="panel" style="background: #f0f7ff; border-color: #93c5fd;">
      <div class="hint" style="display: flex; align-items: center; color: #1e3a8a;">
        <span style="font-weight: 500;">Atualize a página para aplicar as alterações!</span>
      </div>  
    </section>

    <section class="panel">
      <div class="row">
        <label for="author">Sobre a Autora</label>
      </div>
      <div class="hint"><a href="https://www.linkedin.com/in/marianaramacciotti/" target="_blank">Perfil no LinkedIn</a></div>
      <div class="hint"><a href="https://github.com/Ramacciotti" target="_blank">Perfil no GitHub</a></div>
    </section>

    <section class="panel">
      <div class="row">
        <label for="contribute">Apoie com um Pix!</label>
      </div>
      <div class="hint">5c9ace59-8d8a-429a-8ea4-ff96b7969472</div>
    </section>

    <script src="popup.js"></script>
  </body>
</html>
